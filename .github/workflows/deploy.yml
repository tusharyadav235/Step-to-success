name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

env:
  FRONTEND_IMAGE: steptosuccess-frontend
  BACKEND_IMAGE: steptosuccess-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ####################################################
      # Build & Push Backend
      ####################################################

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/steptosuccess-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/steptosuccess-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/steptosuccess-backend:buildcache,mode=max

      ####################################################
      # Build & Push Frontend
      ####################################################

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/steptosuccess-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/steptosuccess-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/steptosuccess-frontend:buildcache,mode=max

      ####################################################
      # Deploy
      ####################################################

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            echo "Connected to EC2"

            cd ~/deploy

            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export EC2_HOST="${{ secrets.EC2_HOST }}"

            echo "Logging into Docker Hub..."

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "Pulling latest images..."

            docker compose pull

            echo "Stopping old containers..."

            docker compose down

            echo "Starting new containers..."

            docker compose up -d

            echo "Cleaning unused images..."

            docker image prune -af

            docker ps
